<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMI University Login</title>

</head>

<body bgcolor="#265e8a">
    <!-- University Logo -->
    <center>
        <font face="Baskerville Old Face" color="#ebebeb">
            <table width="40%">
                <tr>
                    <td align="center">
                        <img src="smiu_logo.png" alt="SMI University" width="100%">
                    </td>
                </tr>
            </table>
        

            <!-- Login Form -->

            <form>

                <table cellpadding="10">
                    <tr align="center">
                        <td align="left">
                            <label for="User ID">User ID</label><br>
                            <input type="text" name="User ID" size="40"  style="height:25px;border: 2px solid #8f8e8e;">
                        </td>
                    </tr>

                    <tr align="center">
                        <td align="left">
                            <label for="User ID">Password</label><br>
                            <input type="Password" name="Password" size="40"
                                style="height:25px;border: 2px solid #8f8e8e;" name="Password">
                        </td>
                    </tr>

                    <tr align="center">
                        <td align="left">
                            <label for="Select a Language">Select a Language</label><br>
                            <select style="width:302px; height:30px;border: 2px solid #8f8e8e;">
                                <option selected>English</option>
                                <option>Urdu</option>
                                <option>Arabic</option>
                                <option>Chinese</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <input type="checkbox" style="border: 2px solid #1a1919;">
                            <label>Enable Accessibility Mode</label>
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <a href="#" style="color:white;">Forgot Your Password?</a>
                        </td>
                    </tr>
                    <tr>

                        
                        <td align="center">
                            <input type="submit" value="Sign In" style="background-color:#4ad3cc;
                         color:black; font-size:16px; 
               width:100px; height:35px; border:#468581; border-radius:5px;">
                        </td>
                    </tr>
                </table>

                <!-- Footer  -->
                <table width="90%">
                    <tr>
                        <td align="center">
                            <img src="./Footer.png" alt="fooder" width="100%">
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <font color="white">
                                Copyright © 2000, 2014, Oracle and/or its affiliates. All rights reserved
                            </font>
                        </td>
                    </tr>
                </table>
            </form>


    </center>
    </font>
</body>

</html>
